<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QNix options</title>
  <style>
    :root { --bg: #002b36; --fg: #839496; --border: #073642; --accent: #268bd2; --code-bg: #073642; }
    body { font-family: system-ui, sans-serif; max-width: 52rem; margin: 0 auto; padding: 1rem 1.5rem 3rem; background: var(--bg); color: var(--fg); line-height: 1.5; }
    .search-wrap { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 0.75rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    #search { width: 100%; box-sizing: border-box; padding: 0.5rem 0.75rem; font-size: 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg); color: var(--fg); }
    #search::placeholder { color: var(--fg); opacity: 0.6; }
    #search:focus { outline: none; border-color: var(--accent); }
    .result-count { font-size: 0.875rem; color: var(--fg); opacity: 0.8; margin-top: 0.35rem; }
    section.option { margin-bottom: 2rem; }
    section.option.hidden { display: none; }
    h2 { font-size: 1.125rem; margin: 0 0 0.5rem; color: var(--accent); }
    pre, code { background: var(--code-bg); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; color: var(--fg); }
    pre { padding: 0.75rem; overflow-x: auto; }
  </style>
</head>
<body>
<div class="search-wrap">
  <input type="search" id="search" placeholder="Search options…" autocomplete="off" aria-label="Search options">
  <div class="result-count" id="result-count"></div>
</div>
<div id="content">
__BODY_PLACEHOLDER__
</div>
<script>
(function() {
  var search = document.getElementById('search');
  var content = document.getElementById('content');
  var resultCount = document.getElementById('result-count');
  var children = Array.from(content.children);
  var sections = [];
  var current = [];
  for (var i = 0; i < children.length; i++) {
    var n = children[i];
    if (n.tagName === 'H2') {
      if (current.length) {
        var sec = document.createElement('section');
        sec.className = 'option';
        current.forEach(function(c) { sec.appendChild(c); });
        sections.push(sec);
      }
      current = [n];
    } else if (current.length) current.push(n);
  }
  if (current.length) {
    var sec = document.createElement('section');
    sec.className = 'option';
    current.forEach(function(c) { sec.appendChild(c); });
    sections.push(sec);
  }
  content.innerHTML = '';
  sections.forEach(function(s) { content.appendChild(s); });

  function filter() {
    var q = (search.value || '').trim().toLowerCase();
    var visible = 0;
    sections.forEach(function(s) {
      var show = !q || (s.textContent || '').toLowerCase().indexOf(q) !== -1;
      s.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    resultCount.textContent = q ? visible + ' of ' + sections.length + ' options' : sections.length + ' options';
  }
  search.addEventListener('input', filter);
  search.addEventListener('keydown', function(e) { if (e.key === 'Escape') { search.value = ''; filter(); search.focus(); } });
  filter();
})();
</script>
</body>
</html>
